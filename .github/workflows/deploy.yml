name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'dist/'
          target: '/var/www/po-copilot'
          strip_components: 0

      - name: Deploy API & restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/po-copilot

            # Write env file from secrets
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env.local
            echo "APP_LOGIN=${{ secrets.APP_LOGIN }}" >> .env.local
            echo "APP_PASSWORD=${{ secrets.APP_PASSWORD }}" >> .env.local
            echo "APP_SESSION_SECRET=${{ secrets.APP_SESSION_SECRET }}" >> .env.local
            echo "BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_API_KEY }}" >> .env.local
            echo "SOCKS_PROXY=${{ secrets.SOCKS_PROXY }}" >> .env.local

            # Pull latest scripts
            git fetch origin main
            git checkout origin/main -- scripts/ package.json package-lock.json

            # Install dependencies
            npm ci --ignore-scripts

            # Ensure tsx is installed globally
            npm install -g tsx

            # Restart PM2 using shell wrapper script
            chmod +x /var/www/po-copilot/scripts/start-api.sh
            pm2 delete po-copilot-api 2>/dev/null || true
            pm2 start /var/www/po-copilot/scripts/start-api.sh --name po-copilot-api
            pm2 save
